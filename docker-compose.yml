version: '3.8'

services:
  ganipedia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ganipedia-app
    expose:
      - "3300"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      ganipedia:
        aliases:
          - ganipedia-app

networks:
  ganipedia:
    external: true

services:
  ganipedia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ganipedia-app
    expose:
      - "3300"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3300
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3300/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      ganipedia:
        aliases:
          - ganipedia-app

networks:
  ganipedia:
    external: true

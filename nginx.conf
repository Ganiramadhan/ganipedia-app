server {
    listen 3001;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Drop server version disclosure
    server_tokens off;
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/manifest+json
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;
    gzip_disable "MSIE [1-6]\.";

    # Long-cache hashed assets emitted by Vite (assets/*.[hash].ext)
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Cache static assets with proper MIME types
    location ~* \.(?:js|css|png|jpe?g|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Specific handling for images in projects folder
    location ~* ^/(projects|reviews)/.+\.(?:png|jpe?g|gif|webp|svg|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SEO files: short cache so updates propagate
    location = /robots.txt {
        access_log off;
        expires 1d;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        access_log off;
        expires 1d;
        try_files $uri =404;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # Handle SPA routing - serve index.html for all routes
    location / {
        # Never cache the HTML shell so deploys take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
}
